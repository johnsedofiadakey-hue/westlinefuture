    <!-- SEO Meta Tags -->

    <meta name="description" content="Westline Future — Global Trading Co, Ltd. Premium structural glass, aluminum works, and interior finishing solutions. Precision sourcing and delivery for ambitious architectural projects worldwide." />

    <!-- Social Meta Tags -->

    <meta property="og:type" content="website" />

    <meta name="twitter:image" content="https://westlinefuture.com/hero_seo.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Westline Future",
      "description": "Global Trading Co, Ltd — Premium structural glass, interior finishing, and precision global sourcing.",
      "url": "https://westlinefuture.com",
      "telephone": "",
      "email": "admin@westlinefuture.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "",
        "addressRegion": "",
        "addressCountry": ""
      },
      "knowsAbout": [
        "Structural Glass Installation",
        "Aluminum Glazing",
        "Shower Cubicles",
        "Glass Balustrades",
        "Office Glass Partitions",
        "Frameless Glass Doors",
        "China Furniture Sourcing",
        "Modern Kitchen Design",
        "Interior Finishing"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Construction & Interior Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Glass Installation & Balustrades" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Shower Cubicles & Enclosures" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Office Glass Partitions" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "China Furniture Sourcing & Logistics" }},
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Interior Deco & Finishing" }}
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ═══ Google Translate (hidden bar, custom toggle) ═══ -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', includedLanguages: 'zh-CN', autoDisplay: false },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
    </script>

    <!-- ═══ Floating EN / 中 Language Button ═══ -->
    <style>
      /* Hide the Google Translate toolbar completely */
      .goog-te-banner-frame, .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      .goog-te-gadget { font-size: 0 !important; }

      #wl-lang-btn {
        position: fixed;
        bottom: 88px;
        right: 20px;
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 6px;
        background: #131623;
        color: #fff;
        border: 1.5px solid rgba(255,255,255,0.15);
        border-radius: 100px;
        padding: 9px 18px 9px 14px;
        font-family: 'Inter', 'Satoshi', sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.2s;
        letter-spacing: 0.02em;
        user-select: none;
      }
      #wl-lang-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(0,0,0,0.45);
        background: #1e2234;
      }
      #wl-lang-btn .wl-flag {
        font-size: 18px;
        line-height: 1;
      }
      #wl-lang-btn .wl-label {
        font-size: 12px;
        opacity: 0.75;
        font-weight: 500;
      }
    </style>

    <button id="wl-lang-btn" title="Toggle language / 切换语言" aria-label="Toggle site language between English and Chinese">
      <span class="wl-flag" id="wl-flag">🇬🇧</span>
      <span id="wl-lang-label">EN</span>
      <span class="wl-label" id="wl-lang-sub">/ 中文</span>
    </button>

    <script>
      (function () {
        var isChinese = false;

        function getCookieLang() {
          var m = document.cookie.match(/googtrans=([^;]+)/);
          if (m) return decodeURIComponent(m[1]);
          return '';
        }

        function setTranslateCookie(val) {
          // Must set on both the domain and /
          var host = location.hostname;
          document.cookie = 'googtrans=' + val + '; path=/; domain=' + host;
          document.cookie = 'googtrans=' + val + '; path=/';
        }

        function applyTranslation(toChinese) {
          if (toChinese) {
            setTranslateCookie('/en/zh-CN');
          } else {
            setTranslateCookie('/en/en');
          }
          location.reload();
        }

        // Detect current state from cookie
        var lang = getCookieLang();
        if (lang.indexOf('zh') !== -1) {
          isChinese = true;
          document.getElementById('wl-flag').textContent = '🇨🇳';
          document.getElementById('wl-lang-label').textContent = '中';
          document.getElementById('wl-lang-sub').textContent = '/ EN';
        }

        document.getElementById('wl-lang-btn').addEventListener('click', function () {
          applyTranslation(!isChinese);
        });
      })();
    </script>
  </body>
</html>
